services:
  - type: web
    name: fun-notification-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:shared
    startCommand: npm start --workspace=apps/backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fun-notification-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: fun-notification-db
    plan: free
    databaseName: fun_notifications
